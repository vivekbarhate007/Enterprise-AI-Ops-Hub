apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ops-frontend
  labels:
    app: ai-ops-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-ops-frontend
  template:
    metadata:
      labels:
        app: ai-ops-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/enterprise-ai-ops-frontend:latest
          ports:
            - containerPort: 5173
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-ops-frontend
spec:
  selector:
    app: ai-ops-frontend
  ports:
    - port: 80
      targetPort: 5173
